# Render Blueprint para perfumes-tovo
# --------------------------------------------------------------
# Backend Node + TypeScript + Express + bot de Telegram 24/7.
#
# Render free tier duerme cada 15 min sin trafico.
# Mantener despierto con un cron-job externo cada 14 min
# apuntando a GET /api/health (ej: cron-job.org, gratis).
#
# TELEGRAM_BOT_TOKEN se carga como Secret desde el dashboard.
# El bot queda ABIERTO (sin whitelist) por decision del usuario.
#
# Activar: dashboard.render.com > New > Blueprint > apuntar a este repo.
#
# Para WhatsApp/Baileys: ver CONTEXTO-WHATSAPP.md y CONTEXTO-WHATSAPP-META.md.

services:
  - type: web
    name: perfumes-tovo
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: rm -rf node_modules && npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: WA_TRANSPORT
        value: baileys
      - key: WA_PHONES
        value: chip1:5492617629556
      - key: WA_ALLOWED_NUMBERS
        value: 542616152378,542616609937
      - key: WA_MAX_PER_HOUR
        value: "30"
      - key: WA_WARMUP_DAYS
        value: "0"
      - key: WA_SHADOWBAN_THRESHOLD
        value: "0.3"
      - key: WA_BACKUP_CONTACT
        value: "542616152378"
      # Telegram bot (token se carga como Secret desde el dashboard).
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Sin TELEGRAM_ALLOWED_USERS -> bot abierto para cualquiera.