app = "perfumes-tovo"
primary_region = "eze"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "3000"

[mounts]
  source = "perfumes_data"
  destination = "/data"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls"]
    http_idle_timeout = "300s"

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"

[processes]
  app = "node dist/infrastructure/http/server.js"
