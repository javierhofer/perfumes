app = "perfumes-tovo"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "3000"

[mounts]
  source = "perfumes_data"
  destination = "/data"

[processes]
  app = "node dist/infrastructure/http/server.js"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  processes = ["app"]
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 443
    handlers = ["tls"]
    http_idle_timeout = "300s"

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"